<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header class="hair">

      <nav class="burger">

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/burger.svg" 
          alt="burger.svg">

        </button>

        <img src="http://127.0.0.1:5500/Group.svg" 
        alt="Group.svg">

      </nav>

      <div class="line">

      </div>

      <div class="search">

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/repair.svg" 
          alt="repair.svg">

        </button>

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/checkstatus.svg" 
          alt="checkstatus.svg">

        </button>

      </div>


    </header>

<br>

    <main class="list">

      <div class="text">

        

        <h1 class="text__title">

          Услуги и сервисы

        </h1>

        <div class="click">

        <div class="button">

          <button type="button" 
          class="button__select 
          button__select--blue"> 

            Ремонтируемые бренды 

          </button>

        </div>

      
      

        <div class="button">

          <button type="button" class="button__select">

           Дополнительные услуги

          </button>

        </div> 



        <div class="button">

          <button type="button" class="button__select">

           Цены на услуги

          </button>

        </div>

        <div class="button">

          <button type="button" class="button__select">

           Адреса сервисных центров

          </button>

        </div>

        <div class="button">

          <button type="button" class="button__select">

           Специальные цены

          </button>
        
        </div>

        </div>



      </div>

    </main>
