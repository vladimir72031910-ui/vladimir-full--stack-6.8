<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header class="hair">

      <nav class="burger">

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/burger.svg" 
          alt="burger.svg">

        </button>

        <img src="http://127.0.0.1:5500/Group.svg" 
        alt="Group.svg">

      </nav>

      <div class="line">

      </div>

      <div class="search">

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/repair.svg" 
          alt="repair.svg">

        </button>

        <button class="hair__button">

          <img src="http://127.0.0.1:5500/checkstatus.svg" 
          alt="checkstatus.svg">

        </button>

      </div>


    </header>

<br>

    <main class="list">

      <div class="text">

        

        <h1 class="text__title">

          Услуги и сервисы

        </h1>

        <div class="click">

        <div class="button">

          <button type="button" 
          class="button__select 
          button__select--blue"> 

            Ремонтируемые бренды 

          </button>

        </div>

      
      

        <div class="button">

          <button type="button" class="button__select">

           Дополнительные услуги

          </button>

        </div> 



        <div class="button">

          <button type="button" class="button__select">

           Цены на услуги

          </button>

        </div>

        <div class="button">

          <button type="button" class="button__select">

           Адреса сервисных центров

          </button>

        </div>

        <div class="button">

          <button type="button" class="button__select">

           Специальные цены

          </button>
        
        </div>

        </div>

      
        

        <div class="information">

          <span class="information__text">
            Мы являемся авторизованым 
            сервисным центром 
            по ремонту техники Dell. Только у нас вы 
            можете отремонтировать свой ноутбук Dell 
            с официальной гарантией производителя.
          </span>

          <div class="information__loading">

            <div class="information__loading--down">
    

            <img src="http://127.0.0.1:5500/ic/expand.svg" 
            alt="expand.svg" >
            </div>
            <span>Читать далее</span>

          </div>


        </div>

        <div class="text__cps">

          <img src="http://127.0.0.1:5500/_MG_3223.svg" 
          alt="cps.svg" class="text__cps text__cps--green ">

        </div>


      </div>

    </main>



</body>
</html>
